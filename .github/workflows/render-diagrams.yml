name: Render PlantUML Diagrams

on:
  push:
    paths:
      - 'docs/architecture/**/*.puml'

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install PlantUML
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q plantuml

      - name: Render .puml files to SVG
        run: |
          find docs/architecture -name "*.puml" | while read f; do
            echo "Rendering $f"
            plantuml -tsvg "$f"
          done

      - name: Commit rendered SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: render PlantUML diagrams [skip ci]"
          file_pattern: "docs/architecture/**/*.svg"
